<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Collection</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f3ee;
      --text: #1a1a1a;
      --muted: #888;
      --border: rgba(0,0,0,0.08);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      padding: 2.5rem 2.5rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      font-weight: 400;
      letter-spacing: -0.02em;
    }
    header p {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
      margin-top: 4px;
    }

    /* ── SECTION ── */
    .section {
      padding: 2rem 2rem 2.5rem;
      border-bottom: 1px solid var(--border);
    }
    .section-header {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .section-header h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.3rem;
      font-weight: 400;
      letter-spacing: -0.01em;
    }
    .section-header span {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .grid {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .row {
      display: flex;
      flex-direction: row;
      position: relative;
      margin-left: -4px;
    }

    /* ══════════════════════════════════
       VINYL
    ══════════════════════════════════ */
    .row-vinyl { height: 210px; }

    .vinyl {
      perspective: 500px;
      width: 30px;
      flex-shrink: 0;
      transition: width 0.45s cubic-bezier(0.4,0,0.2,1);
      position: relative;
    }
    .vinyl:hover { width: 155px; }

    .vinyl img {
      transition: transform 0.45s cubic-bezier(0.4,0,0.2,1),
                  width 0.45s, height 0.45s, margin-top 0.45s, box-shadow 0.45s;
      width: 185px;
      height: 185px;
      transform: rotateY(25deg);
      transform-style: preserve-3d;
      border-radius: 3px;
      border: 1px solid rgba(0,0,0,0.12);
      object-fit: cover;
      display: block;
    }
    .vinyl:hover img {
      transform: rotateY(8deg);
      width: 192px;
      height: 192px;
      margin-top: -4px;
      box-shadow: 6px 12px 32px rgba(0,0,0,0.18);
    }

    /* ══════════════════════════════════
       BOOK / PAGE-TURN
    ══════════════════════════════════ */
    .row-book { height: 250px; }

    .book {
      width: 22px;
      flex-shrink: 0;
      position: relative;
      transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
      perspective: 800px;
    }
    .book:hover { width: 170px; }

    .book-inner {
      position: relative;
      width: 160px;
      height: 228px;
      transform-style: preserve-3d;
    }

    .book-back {
      position: absolute;
      inset: 0;
      border-radius: 2px 5px 5px 2px;
      background: #c8c3b8;
      border: 1px solid rgba(0,0,0,0.15);
      transform: rotateY(32deg);
      transform-origin: left center;
      transition: transform 0.5s cubic-bezier(0.4,0,0.2,1), box-shadow 0.5s;
    }

    .book-front {
      position: absolute;
      inset: 0;
      border-radius: 2px 5px 5px 2px;
      overflow: hidden;
      transform: rotateY(32deg);
      transform-origin: left center;
      transform-style: preserve-3d;
      transition: transform 0.5s cubic-bezier(0.4,0,0.2,1), box-shadow 0.5s;
      border: 1px solid rgba(0,0,0,0.12);
    }
    .book-front img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* spine line */
    .book-front::after {
      content: '';
      position: absolute;
      top: 0; left: 14px;
      width: 1px; height: 100%;
      background: rgba(0,0,0,0.08);
      pointer-events: none;
    }

    /* open on hover */
    .book:hover .book-front {
      transform: rotateY(-10deg);
      box-shadow: 10px 16px 40px rgba(0,0,0,0.2);
    }
    .book:hover .book-back {
      box-shadow: 2px 8px 16px rgba(0,0,0,0.1);
    }

    /* placeholder */
    .book-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #e2ddd5;
      gap: 8px;
    }
    .book-placeholder .ph-icon {
      font-size: 26px;
      opacity: 0.3;
    }
    .book-placeholder .ph-text {
      font-size: 9px;
      letter-spacing: 0.08em;
      color: #999;
      text-align: center;
      padding: 0 10px;
      line-height: 1.5;
    }

    /* ── shared label ── */
    .item-label {
      position: absolute;
      bottom: -1.4rem;
      left: 0;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.04em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .vinyl:hover .item-label,
    .book:hover .item-label { opacity: 1; }

    footer {
      padding: 2rem 2.5rem;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.06em;
    }
  </style>
</head>

  /* ── layout constants — keep in sync with CSS ── */
  const VINYL_W     = 30;
  const BOOK_W      = 22;
  const ROW_PADDING = 64;

  function buildVinylRow(chunk) {
    const row = document.createElement('div');
    row.className = 'row row-vinyl';
    chunk.forEach(v => {
      const div = document.createElement('div');
      div.className = 'vinyl';
      div.innerHTML = `<img src="${v.src}" alt="${v.title}" loading="lazy">
                       <span class="item-label">${v.title}</span>`;
      row.appendChild(div);
    });
    return row;
  }

  function buildBookRow(chunk) {
    const row = document.createElement('div');
    row.className = 'row row-book';
    chunk.forEach(v => {
      const div = document.createElement('div');
      div.className = 'book';
      const coverHTML = v.src
        ? `<img src="${v.src}" alt="${v.title}" loading="lazy">`
        : `<div class="book-placeholder">
             <span class="ph-icon">&#9647;</span>
             <span class="ph-text">${v.title}</span>
           </div>`;
      div.innerHTML = `
        <div class="book-inner">
          <div class="book-back"></div>
          <div class="book-front">${coverHTML}</div>
        </div>
        <span class="item-label">${v.title}</span>`;
      row.appendChild(div);
    });
    return row;
  }

  function buildGrid(items, gridId, countId, type) {
    const grid      = document.getElementById(gridId);
    const countEl   = document.getElementById(countId);
    const itemW     = type === 'vinyl' ? VINYL_W : BOOK_W;
    const available = window.innerWidth - ROW_PADDING;
    const perRow    = Math.max(1, Math.floor(available / itemW));

    grid.innerHTML = '';
    countEl.textContent = items.length + ' items';

    for (let i = 0; i < items.length; i += perRow) {
      const chunk = items.slice(i, i + perRow);
      const row   = type === 'vinyl' ? buildVinylRow(chunk) : buildBookRow(chunk);
      grid.appendChild(row);
    }
  }

  function buildAll() {
    buildGrid(records, 'grid-records', 'count-records', 'vinyl');
    buildGrid(movies,  'grid-movies',  'count-movies',  'book');
    buildGrid(anime,   'grid-anime',   'count-anime',   'book');
  }

  buildAll();
  window.addEventListener('resize', buildAll);
